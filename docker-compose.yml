services:

  app:

    build: .

    container_name: photocloud-app

    ports:
      - "3000:3000"

    depends_on:
      - db

  db:

    image: postgres:15

    container_name: photocloud-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: redesocial

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: